<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>여신업무방법서 학습앱</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>여신업무방법서 학습앱</h1>
      <p class="subtitle">조문 확인 중심 · OX / 4지선다 · 편/장/조 선택형 학습</p>
    </div>
    <div class="meta-pill">data.json + quiz.json</div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="manual">방법서</button>
    <button class="tab" data-tab="quiz">문제풀이</button>
  </nav>

  <main class="layout">
    <section id="manualTab" class="tab-panel active">
      <section class="controls card">
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="조문 번호, 제목, 내용 검색" />
        </div>
        <div class="filter-wrap">
          <select id="partSelect">
            <option value="">전체 편</option>
          </select>
          <select id="chapterSelect">
            <option value="">전체 장</option>
          </select>
        </div>
      </section>

      <section class="manual-layout">
        <aside class="toc card">
          <div class="card-title">목차</div>
          <div id="tocList" class="toc-list"></div>
        </aside>

        <section class="content">
          <div id="articleCount" class="count-text"></div>
          <div id="articleList" class="article-list"></div>
        </section>
      </section>
    </section>

    <section id="quizTab" class="tab-panel">
      <section class="quiz-builder card">
        <div class="card-title">문제 범위 설정</div>
        <div class="quiz-builder-grid">
          <div class="field wide">
            <label for="quizPreset">기본 세팅</label>
            <select id="quizPreset">
              <option value="random">랜덤 편 · 장 · 조</option>
              <option value="custom">직접 선택</option>
            </select>
          </div>
          <div class="field">
            <label for="quizPartSelect">편 선택</label>
            <select id="quizPartSelect">
              <option value="">전체 편</option>
            </select>
          </div>
          <div class="field">
            <label for="quizChapterSelect">장 선택</label>
            <select id="quizChapterSelect">
              <option value="">전체 장</option>
            </select>
          </div>
          <div class="field">
            <label for="quizArticleStart">시작 조</label>
            <input id="quizArticleStart" type="number" min="1" placeholder="예: 120" />
          </div>
          <div class="field">
            <label for="quizArticleEnd">끝 조</label>
            <input id="quizArticleEnd" type="number" min="1" placeholder="예: 150" />
          </div>
          <div class="field actions wide">
            <button id="applyQuizRangeBtn" class="primary-btn">범위 적용</button>
            <button id="clearQuizRangeBtn" class="secondary-btn">기본값으로 복원</button>
          </div>
        </div>
        <p id="quizScopeSummary" class="scope-summary"></p>
      </section>

      <section class="quiz-toolbar card">
        <div class="quiz-stats">
          <span id="quizTotal">총 0문제</span>
          <span id="quizProgress">0 / 0</span>
          <span id="quizScore">정답 0</span>
        </div>
        <div class="quiz-actions">
          <button id="shuffleBtn" class="secondary-btn">문제 섞기</button>
          <button id="resetBtn" class="secondary-btn">다시 풀기</button>
        </div>
      </section>

      <section id="quizList" class="quiz-list"></section>
    </section>
  </main>

  <template id="articleTemplate">
    <article class="article-card card">
      <div class="article-head">
        <div class="article-path"></div>
        <h2 class="article-title"></h2>
      </div>
      <div class="article-body"></div>
    </article>
  </template>

  <template id="quizTemplate">
    <article class="quiz-card card">
      <div class="quiz-type"></div>
      <div class="quiz-meta"></div>
      <h3 class="quiz-prompt"></h3>
      <div class="quiz-statement"></div>
      <div class="quiz-options"></div>
      <div class="quiz-result"></div>
      <details class="source-box">
        <summary>정확한 조문 보기</summary>
        <div class="source-body"></div>
      </details>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
