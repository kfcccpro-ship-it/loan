<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MG인재개발원 여신업무방법서 학습 지원</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="top">
  <h1>
    MG인재개발원<br/>
    여신업무방법서 학습 지원
  </h1>
  <p class="version">기준: 2026.03 개정</p>
</header>

<div class="tabs">
  <button onclick="setTab('search')" id="tabSearch" class="active">방법서 검색</button>
  <button onclick="setTab('quiz')" id="tabQuiz">학습용 문제</button>
</div>

<div id="searchTab">
  <input id="searchInput" placeholder="키워드 입력" />
  <button onclick="runSearch()">검색</button>
  <button onclick="openToc()">목차로 찾기</button>

  <div id="results"></div>
</div>

<div id="quizTab" style="display:none;">
  <button onclick="startQuiz()">문제 시작</button>
  <div id="quizArea"></div>
</div>

<footer>
주의사항 : 교육용 웹앱으로 업데이트 및 기타세부사항은 직접 엠지니를 활용하시기 바랍니다.
</footer>

<script src="app.js"></script>
</body>
</html>
